<html lang="en">

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Writing Activity Heatmap</title>
        <style>
            :root {
                --bg: #ffffff;
                --text: #111827;
                --muted: #6b7280;
                --empty: #f3f4f6;
                --l1: #e5e7eb;
                --l2: #d1d5db;
                --l3: #9ca3af;
                --l4: #6b7280;
                --l5: #374151;
                --size: 12px;
                --gap: 3px;
            }

            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 2rem;
                box-sizing: border-box;
            }

            h2 {
                margin: 0 0 0.25rem;
                font-weight: 600;
                font-size: 1.25rem;
            }
            p.sub {
                margin: 0 0 1.5rem;
                color: var(--muted);
                font-size: 0.875rem;
            }

            .wrapper {
                display: flex;
                gap: 0.5rem;
                overflow-x: auto;
                padding-bottom: 1rem;
                border-bottom: 1px solid var(--l2);
                align-items: start;
            }

            .labels {
                display: grid;
                grid-template-rows: repeat(7, var(--size));
                gap: var(--gap);
                font-size: 0.6rem;
                color: var(--muted);
                height: calc(7 * var(--size) + 6 * var(--gap));
            }
            .labels div {
                height: var(--size);
                display: flex;
                align-items: center;
            }

            .grid {
                display: grid;
                grid-template-rows: repeat(7, var(--size));
                grid-auto-columns: var(--size);
                grid-auto-flow: column;
                gap: var(--gap);
            }

            .day {
                width: var(--size);
                height: var(--size);
                border-radius: 2px;
                background: var(--empty);
                position: relative;
                cursor: pointer;
                transition:
                    transform 0.1s ease,
                    box-shadow 0.1s ease;
            }
            .day:hover {
                transform: scale(1.4);
                box-shadow: 0 0 0 2px var(--l4);
                z-index: 2;
            }

            .day::after {
                content: attr(data-tip);
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%) translateY(-4px);
                background: var(--text);
                color: #fff;
                padding: 4px 6px;
                border-radius: 4px;
                font-size: 0.65rem;
                white-space: nowrap;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.15s ease;
                z-index: 10;
            }
            .day:hover::after {
                opacity: 1;
            }

            .day.l1 { background: var(--l1); }
            .day.l2 { background: var(--l2); }
            .day.l3 { background: var(--l3); }
            .day.l4 { background: var(--l4); }
            .day.l5 { background: var(--l5); }
            .day.empty {
                background: transparent;
                cursor: default;
            }

            .legend {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                margin-top: 1rem;
                font-size: 0.75rem;
                color: var(--muted);
            }
            .legend .box {
                width: var(--size);
                height: var(--size);
                border-radius: 2px;
            }

            .year-row {
                display: flex;
                align-items: start;
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .year-label {
                font-size: 0.8rem;
                font-weight: 700;
                color: var(--muted);
                width: 2.5rem;
                padding-top: 2px;
                flex-shrink: 0;
                text-align: right;
            }

            .year-body {
                flex: 1;
            }

            .year-stats {
                margin: 0.4rem 0 0;
                font-size: 0.75rem;
                color: var(--muted);
            }

            .legend {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                margin-top: 0.5rem;
                font-size: 0.75rem;
                color: var(--muted);
            }
            .legend .box {
                width: var(--size);
                height: var(--size);
                border-radius: 2px;
            }
        </style>
    </head>
